name: Update SECP
on:
    workflow_dispatch:
    schedule:
      - cron: "0 4 * * *"

jobs:
    update:
      runs-on: ubuntu-latest
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
      permissions:
        contents: write
      steps:
        - uses: actions/checkout@v4
          with:
            persist-credentials: false

        - uses: actions/setup-node@v4
          with:
            node-version: "20"

        - name: Install and run
          run: |
            cd scripts
            npm install
            npx puppeteer browsers install chrome
            node scrape-secp.js

        - name: Commit changes
          run: |
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git add index.html changelog.json news.json scripts/scrape-secp.js .github/workflows/update-secp.yml 2>/dev/null || true
            git diff --cached --quiet || git commit -m "Auto-update SECP data"

        - name: Push changes
          uses: ad-m/github-push-action@master
          with:
            branch: main
            github_token: ${{ secrets.GITHUB_TOKEN }}