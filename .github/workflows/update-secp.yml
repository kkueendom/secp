name: Update SECP                                                                                                                                                                                                        
on:
    workflow_dispatch:
    schedule:
      - cron: "0 4 * * 1"

  jobs:
    update:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-node@v4
          with:
            node-version: "20"

        - name: Install and run
          run: |
            cd scripts
            npm install
            npx puppeteer browsers install chrome
            node scrape-secp.js

        - name: Commit changes
          run: |
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git diff --quiet index.html || (git add index.html && git commit -m "Auto-update SECP data" && git push)
